<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site Minecraft</title>
    <style>
        body {
            background-color: #313131;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .mc-button {
            display: inline-block;
            padding: 15px 30px;
            font-size: 20px;
            color: #FFFFFF;
            text-align: center;
            text-decoration: none;
            background-color: #666666;
            
            /* Bordas estilo Minecraft */
            border: 4px solid #000000;
            box-shadow: inset -4px -4px 0px #333333, 
                        inset 4px 4px 0px #AAAAAA;
            
            cursor: pointer;
            text-shadow: 2px 2px #222222;
            image-rendering: pixelated;
        }

        .mc-button:active {
            box-shadow: inset 4px 4px 0px #333333, 
                        inset -4px -4px 0px #AAAAAA;
            padding-top: 17px;
            padding-bottom: 13px;
        }

        .mc-button:hover {
            background-color: #7d7d7d;
            border-color: #ffffff; /* Brilho de seleção */
        }
    </style>
</head>
<body>

    <a href="#" class="mc-button">JOGAR</a>

</body>
</html>
