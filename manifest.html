<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manifest Generator</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    padding:28px;

    background:
    radial-gradient(circle at top,
    #2f2f2f 0%,
    #151515 45%,
    #090909 100%);

    font-family:'Press Start 2P', cursive;

    color:white;
}

.container{

    width:100%;
    max-width:1000px;

    margin:auto;

    padding:28px;

    border-radius:30px;

    background:
    linear-gradient(
    to bottom,
    rgba(30,30,30,.98),
    rgba(12,12,12,.98));

    border:6px solid #000;

    box-shadow:
    0 20px 60px rgba(0,0,0,.8);
}

.title{

    font-size:24px;

    margin-bottom:30px;

    text-shadow:4px 4px 0 #000;
}

.form-grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:20px;
}

.form-group{

    display:flex;
    flex-direction:column;
}

.form-group label{

    margin-bottom:12px;

    font-size:10px;

    color:#ffe66d;
}

.input,
.select{

    width:100%;
    height:60px;

    border:none;

    border-radius:18px;

    padding:14px;

    color:white;

    background:
    linear-gradient(
    to bottom,
    #393939,
    #262626);

    font-family:'Press Start 2P', cursive;
    font-size:10px;
}

.generate-btn{

    width:100%;
    height:68px;

    margin-top:30px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    color:white;

    font-size:11px;

    font-family:'Press Start 2P', cursive;

    background:
    linear-gradient(
    to bottom,
    #7a7aff,
    #5f5fff);

    box-shadow:
    inset 0 4px 0 rgba(255,255,255,.2),
    inset 0 -4px 0 rgba(0,0,0,.4),
    0 10px 25px rgba(0,0,0,.5);
}

.output{

    width:100%;
    min-height:320px;

    margin-top:24px;

    border:none;

    border-radius:20px;

    padding:18px;

    resize:none;

    background:#080808;

    color:#7dff9f;

    font-family:monospace;
    font-size:12px;
}

@media(max-width:900px){

    .form-grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        Manifest Generator
    </div>

    <div class="form-grid">

        <div class="form-group">

            <label>Addon Name</label>

            <input
            type="text"
            class="input"
            id="addonName"
            value="Star Addon">

        </div>

        <div class="form-group">

            <label>Description</label>

            <input
            type="text"
            class="input"
            id="addonDescription"
            value="Generated by Star Maker">

        </div>

        <div class="form-group">

            <label>Manifest Type</label>

            <select
            class="select"
            id="manifestType">

                <option>Manifest Behavior</option>
                <option>Manifest Resource</option>

            </select>

        </div>

        <div class="form-group">

            <label>Module Type</label>

            <select
            class="select"
            id="moduleType">

                <option>data</option>
                <option>resources</option>
                <option>script</option>

            </select>

        </div>

    </div>

    <button class="generate-btn" id="generateManifest">
        GENERATE MANIFEST
    </button>

    <textarea
    class="output"
    id="manifestOutput"></textarea>

</div>

<script>

function uuidv4(){

    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'
    .replace(/[xy]/g,function(c){

        const r =
        Math.random()*16|0;

        const v =
        c === 'x'
        ? r
        : (r&0x3|0x8);

        return v.toString(16);
    });
}

document
.getElementById('generateManifest')
.onclick = ()=>{

    const name =
    document.getElementById('addonName').value;

    const description =
    document.getElementById('addonDescription').value;

    const moduleType =
    document.getElementById('moduleType').value;

    const manifest = {

        format_version:2,

        header:{

            name:name,

            description:description,

            uuid:uuidv4(),

            version:[1,0,0],

            min_engine_version:[1,21,100]
        },

        modules:[

            {

                type:moduleType,

                uuid:uuidv4(),

                version:[1,0,0]
            }
        ]
    };

    document
    .getElementById('manifestOutput')
    .value =
    JSON.stringify(manifest,null,4);
};

</script>

</body>
</html>
